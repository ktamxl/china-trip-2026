<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Restaurants — Tam Family China 2026</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sh:#1a6880;--zj:#5a8a3a;--sz:#c04a0c;--gold:#c9a84c;--w:#fff;--soft:#f5f2ec}
body{font-family:Georgia,'Times New Roman',serif;background:#f5f2ec;color:#1a1a2e;line-height:1.7}
html{scroll-behavior:smooth}
.hero{background:linear-gradient(160deg,#1a0d2e,#2d1b52);color:#fff;text-align:center;padding:52px 24px 40px}
.hero-badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:3px 14px;border-radius:20px;margin-bottom:14px}
.hero h1{font-size:clamp(1.6rem,5vw,2.6rem);font-weight:normal;margin-bottom:6px;letter-spacing:.02em}
.hero-sub{font-size:.9rem;opacity:.8}
.hero-stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:16px}
.hs{text-align:center}
.hs .v{font-size:1.4rem;font-weight:bold;color:var(--gold);display:block;font-family:sans-serif}
.hs .l{font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:.1em;font-family:sans-serif;display:block}
.sticky-nav{position:sticky;top:0;z-index:100;background:#1a0d2e;display:flex;justify-content:center;overflow-x:auto;scrollbar-width:none}
.sticky-nav a{color:rgba(255,255,255,.72);text-decoration:none;font-family:sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:11px 14px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s}
.sticky-nav a:hover{color:var(--gold)}
.sticky-nav a.active{color:var(--gold);border-bottom-color:var(--gold)}
.ctabs{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:24px auto;max-width:900px;padding:0 24px}
.ct{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:40px;font-family:sans-serif;font-size:.85rem;text-decoration:none;font-weight:bold;color:#fff;transition:all .25s}
.ct:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.ct.sh{background:var(--sh)}
.ct.zj{background:var(--zj)}
.ct.sz{background:var(--sz)}
.sb{max-width:900px;margin:0 auto;padding:0 24px 48px}
.sb h2{font-size:1.6rem;font-weight:normal;margin-bottom:8px}
.sb .sd{font-size:.88rem;opacity:.6;margin-bottom:28px;font-family:sans-serif}
.c{background:var(--w);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.13);margin-bottom:16px;overflow:hidden;display:grid;grid-template-columns:68px 1fr;transition:transform .2s}
.c:hover{transform:translateY(-2px)}
.cn{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--w);font-family:sans-serif;padding:16px 8px;text-align:center;min-height:100px}
.ce{font-size:1.5rem;display:block}
.cl{font-size:.55rem;opacity:.7;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.cb{padding:16px 18px 14px 14px}
.cb h3{font-size:1.05rem;font-weight:normal;margin-bottom:4px}
.cchi{font-size:.75rem;font-family:sans-serif;margin-bottom:8px}
.cinf{font-size:.72rem;color:#555;margin-bottom:8px;line-height:1.6;font-family:sans-serif}
.clbl{font-family:sans-serif;font-size:.7rem;font-weight:bold;margin-bottom:5px}
.cfam{font-size:.82rem;opacity:.7;margin-bottom:8px}
.chl{font-size:.7rem;font-weight:bold;margin-bottom:8px}
.ctags{display:flex;flex-wrap:wrap;gap:5px}
.t{display:inline-block;font-size:.6rem;padding:2px 8px;border-radius:20px;font-family:sans-serif;background:var(--soft)}
.t.hl{background:var(--gold)}
footer{text-align:center;padding:28px 24px;font-family:sans-serif;font-size:.72rem;opacity:.4;border-top:1px solid rgba(0,0,0,.08);margin-top:16px}
</style></head>

  <h1>Restaurants</h1>

  <div class="hero-stats">

</div>
